<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact | CubLion Entertainment</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#1F2F4A;
  --gold:#C6A56A;
  --black:#0B0F16;
  --white:#FFFFFF;
}
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background: var(--navy);
  color: var(--white);
  line-height: 1.75;
}

/* NAV */
nav{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: rgba(31,47,74,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  z-index: 1000;
  padding: 18px 28px;
}
.nav-inner{
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 72px 1fr 72px;
  align-items: center;
}
.nav-insignia{
  height: 52px;
  width: auto;
  display:block;
  transition: transform .2s ease;
}
.nav-insignia:hover{ transform: scale(1.05); }

.nav-links{
  justify-self: center;
  display: flex;
  gap: 36px;
  align-items: center;
}
.nav-links a{
  color: var(--gold);
  text-decoration: none;
  font-weight: 600;
  font-size: 20px;
  transition: opacity .15s ease;
}
.nav-links a:hover{ opacity:.85; }

/* PAGE */
.container{
  max-width: 820px;
  margin: 0 auto;
  padding: 160px 20px 100px;
  text-align: center;
}
.center-lion{
  height: 120px;
  width: auto;
  margin: 10px auto 22px;
  display:block;
  filter: drop-shadow(0 10px 24px rgba(0,0,0,.20));
}
.gold{
  background: linear-gradient(90deg,#C6A56A,#E0C48F);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
h1{
  font-family:'Playfair Display', serif;
  font-size: 44px;
  margin: 0 0 14px 0;
}
.lede{
  max-width: 760px;
  margin: 0 auto 24px;
  font-size: 18px;
  opacity: .92;
}

/* FORM */
.form-wrap{
  max-width: 640px;
  margin: 20px auto 0;
  text-align: left;
}
label{
  display:block;
  font-weight: 700;
  font-size: 13px;
  opacity: .9;
  margin-bottom: 6px;
}
.field{
  width:100%;
  padding: 12px;
  margin-bottom: 16px;
  border-radius: 10px;
  border:none;
  outline:none;
}
.field, textarea{
  font-family:'Inter', sans-serif;
  font-size: 16px;
}
button{
  width:100%;
  padding: 14px 26px;
  border-radius: 999px;
  background: var(--gold);
  border:none;
  font-weight: 900;
  cursor:pointer;
  color:#111;
}
button:hover{ opacity:.92; }

.small-note{
  font-size: 12px;
  opacity: .75;
  margin-top: 10px;
  line-height: 1.5;
}

@media (max-width: 900px){
  .nav-links{ display:none; }
}
</style>
</head>

<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" aria-label="Home">
      <img src="lion.png" class="nav-insignia" alt="CubLion Home">
    </a>

    <div class="nav-links">
      <a href="our-story.html">Our Story</a>
      <a href="how-it-works.html">How it Works</a>
      <a href="faq.html">FAQ</a>
      <a href="contact.html">Contact</a>
    </div>

    <div></div>
  </div>
</nav>

<div class="container">
  <img src="lion.png" class="center-lion" alt="CubLion">

  <h1 class="gold">Contact</h1>
  <p class="lede">
    Tell us what you’re looking for — event, city, date range, seating preferences, party size, and budget — and we’ll respond with next steps.
  </p>

  <form class="form-wrap" action="https://formspree.io/f/mreadqad" method="POST">
    <label for="name">Full name</label>
    <input class="field" id="name" name="name" type="text" required />

    <label for="email">Email</label>
    <input class="field" id="email" name="email" type="email" required />

    <label for="phone">Phone (optional)</label>
    <input class="field" id="phone" name="phone" type="text" />

    <label for="company">Company (optional)</label>
    <input class="field" id="company" name="company" type="text" />

    <label for="message">What are you looking for?</label>
    <textarea class="field" id="message" name="message" rows="6" required></textarea>

    <button type="submit">Submit Inquiry</button>

    <div class="small-note">
      By submitting, you agree to be contacted regarding your request. We don’t sell your information.
    </div>
  </form>
</div>

</body>
</html>
