<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Our Story | CubLion Entertainment</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Parisienne&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#1F2F4A;
  --gold:#C6A56A;
  --black:#0B0F16;
  --white:#FFFFFF;
}

body{
  margin:0;
  font-family:'Cinzel', serif;
  background: var(--navy);
  color: var(--white);
}

/* NAV */
nav{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: rgba(31,47,74,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 20px 28px;
  z-index: 1000;
}

.nav-inner{
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 72px 1fr 72px;
  align-items: center;
}

.nav-insignia{
  height: 54px;
  transition: transform .2s ease, filter .2s ease;
}
.nav-insignia:hover{
  transform: scale(1.05);
  filter: drop-shadow(0 0 8px rgba(198,165,106,.30));
}

.nav-links{
  justify-self: center;
  display: flex;
  gap: 36px;
}

.nav-links a{
  color: var(--gold);
  text-decoration: none;
  font-size: 22px;
  letter-spacing: 0.06em;
}

.nav-links a:hover{
  opacity:.8;
}

/* HERO */
header{
  text-align:center;
  padding: 240px 20px 40px;
}

/* 🔥 Enlarged Lion */
.top-lion{
  width: 420px;           /* ~4x larger */
  max-width: 85vw;        /* responsive on smaller screens */
  margin-bottom: 30px;
  filter: drop-shadow(0 0 18px rgba(198,165,106,.25));
}

.gold{
  background: linear-gradient(90deg, #C6A56A, #E0C48F);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

h1{
  font-size:38px;
  margin:0;
}

/* CONTENT */
main{
  background:white;
  color:var(--navy);
  padding:80px 20px 100px;
}

.container{
  max-width:900px;
  margin:0 auto;
}

.kicker{
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 12px;
  font-weight: 700;
  opacity: 0.85;
  margin: 0 0 12px 0;
}

h2{
  margin: 38px 0 12px 0;
  font-size:24px;
  letter-spacing:0.02em;
}

p{
  line-height:2;
  font-size:15px;
  margin:0 0 18px 0;
  letter-spacing:0.01em;
}

.list{
  margin: 10px 0 26px 0;
  padding: 0;
  list-style: none;
}

.list li{
  margin: 10px 0;
  padding-left: 18px;
  position: relative;
  line-height: 1.9;
  font-size: 14px;
}

.list li::before{
  content: "•";
  position: absolute;
  left: 0;
  color: var(--gold);
  font-weight: 700;
}

/* PHOTO */
.photo-section{
  margin:50px 0;
  text-align:center;
}

.photo-section img{
  width:100%;
  max-width:750px;
  border-radius:18px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.caption{
  margin-top:14px;
  font-size:13px;
  letter-spacing:0.04em;
  opacity:.78;
}

/* CALLOUT */
.callout{
  border: 1px solid rgba(31,47,74,0.12);
  border-radius: 18px;
  padding: 22px;
  background: #fff;
  box-shadow: 0 10px 24px rgba(31,47,74,0.10);
  margin: 28px 0 10px 0;
}

/* SIGNATURE */
.signature{
  margin-top:60px;
  text-align:right;
}

.signature-close{
  font-size: 14px;
  opacity: 0.85;
  margin-bottom: 8px;
}

.signature-name{
  font-family:'Parisienne', cursive;
  font-size:52px;
  color:var(--navy);
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px 20px;
  background:var(--black);
  color:rgba(255,255,255,0.7);
  font-size:12px;
  letter-spacing:0.06em;
}

@media (max-width: 768px){
  header{ padding-top: 200px; }
  .top-lion{ width: 280px; }
  h1{ font-size: 30px; }
}
</style>
</head>

<body>

<nav>
  <div class="nav-inner">
    <a href="index.html">
      <img src="lion.png" class="nav-insignia" alt="CubLion Home">
    </a>

    <div class="nav-links">
      <a href="our-story.html">Our Story</a>
      <a href="how-it-works.html">How it Works</a>
      <a href="faq.html">FAQ</a>
      <a href="index.html#contact">Contact</a>
    </div>

    <div></div>
  </div>
</nav>

<header>
  <img src="lion.png" class="top-lion" alt="CubLion Insignia">
  <h1 class="gold">Our Story</h1>
</header>

<!-- Rest of your content remains unchanged -->

</body>
</html>
